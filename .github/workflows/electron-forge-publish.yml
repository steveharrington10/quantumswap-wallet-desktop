name: Build/Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write   # Required for release publishing
  actions: read
  checks: read

jobs:
  release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Publish
        run: npm run publish

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: |
            out/make/squirrel.windows/x64/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
